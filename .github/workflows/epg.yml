name: EPG
# Grab real programme listings on GitHub's runners (not your box) and publish guide.xml to the
# orphan `epg-data` branch. The server curls that file daily — see README "Real programme listings".
on:
  schedule:
    - cron: '0 3 * * *'   # daily 03:00 UTC
  workflow_dispatch: {}

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # runner already has Node/npm — no setup-node needed

      - name: Build channel list from iptv-org's public API
        run: |
          python3 epg/build_channels.py > channels.xml
          echo "channels.xml: $(grep -c '<channel ' channels.xml) channels"

      - name: Grab EPG with iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git grabber
          cd grabber && npm install --no-audit --no-fund
          # The grabber exits non-zero if any single site errors — a partial guide is still useful,
          # so don't let one flaky EPG site fail the whole run. We gate on the output below instead.
          set +e
          npm run grab --- --channels=../channels.xml --days=2 --maxConnections=5 --output=../guide.xml
          echo "grabber exit: $?"
          set -e
          cd "$GITHUB_WORKSPACE"
          echo "=== xml files produced (excluding node_modules) ==="
          find . -path ./grabber/node_modules -prune -o -name '*.xml' -print
          # The grabber's output path can vary — take whatever guide.xml it wrote
          FOUND=$(find . -path ./grabber/node_modules -prune -o -name 'guide.xml' -type f -print | head -1)
          [ -n "$FOUND" ] && [ "$FOUND" != "./guide.xml" ] && cp "$FOUND" guide.xml
          echo "=== guide.xml at root ==="; ls -l guide.xml 2>/dev/null || echo "(none)"
          echo "programmes: $(grep -c '<programme' guide.xml 2>/dev/null || echo 0)"

      - name: Publish guide.xml to epg-data branch
        run: |
          if [ ! -s guide.xml ] || ! grep -q '<programme' guide.xml; then
            echo "::error::grab produced no usable guide.xml (empty or no programmes)"; exit 1
          fi
          mkdir pub && cp guide.xml pub/
          cd pub
          git init -q && git checkout -q -b epg-data
          git add guide.xml
          git -c user.email=actions@github.com -c user.name=github-actions commit -q -m "EPG $(date -u +%F)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" epg-data
